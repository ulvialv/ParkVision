  <script>
    (function () {
      function show(label, info) {
        var el = document.getElementById('err-overlay');
        var pl = document.getElementById('pre-loader');
        if (pl) pl.style.display = 'none';
        if (!el) return;
        el.style.display = 'block';
        el.textContent += '── ' + label + ' ─────────────────────────\n' + info + '\n\n';
      }
      function fmt(e) {
        if (!e) return 'undefined';
        if (typeof e === 'string') return e;
        if (e.error)   return fmt(e.error);
        if (e.reason)  return fmt(e.reason);
        if (e.message) return (e.message || '') + (e.stack ? '\n' + e.stack : '');
        try { return JSON.stringify(e, Object.getOwnPropertyNames(e), 2); } catch (_) { return String(e); }
      }
      // Errors we deliberately swallow — transient + harmless, the app
      // recovers on its own and forcing the user onto a red overlay is
      // far worse than letting them keep tapping.
      function isIgnorable(info) {
        if (!info) return false;
        var s = String(info);
        return (
          s.indexOf('_leaflet_pos') !== -1 ||                       // zoom-after-unmount
          s.indexOf('Set map center and zoom first') !== -1 ||      // map removed mid-animation
          (s.indexOf('leaflet') !== -1 && s.indexOf('undefined') !== -1)
        );
      }
      window.addEventListener('error', function (e) {
        var msg = fmt(e);
        if (isIgnorable(msg) || isIgnorable(e && e.filename)) return;
        show('window.onerror @ ' + (e.filename||'?') + ':' + (e.lineno||'?'), msg);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var msg = fmt(e);
        if (isIgnorable(msg)) return;
        show('unhandledrejection', msg);
      });
    })();
  </script>

    // ~5 m between adjacent kerb-side stalls is realistic for a sedan.
    const SLOT_SPACING_M = 5.2;
    const M_PER_DEG_LAT  = 111_111;

    function generateSlots(zoneId, count, availableList, baseLat, baseLng, headingDeg = 90) {
      // Project a centered line of slots along the street's heading vector.
      const headingRad = (headingDeg * Math.PI) / 180;
      const dN_per_step = Math.cos(headingRad) * SLOT_SPACING_M;   // metres north / step
      const dE_per_step = Math.sin(headingRad) * SLOT_SPACING_M;   // metres east  / step
      const mPerDegLng  = M_PER_DEG_LAT * Math.cos((baseLat * Math.PI) / 180);
      const half        = (count - 1) / 2;

      return Array.from({length: count}, (_, i) => {
        const slotNumber = i + 1;
        const isAvailable = availableList.includes(slotNumber);
        // Distance from zone centre, in steps (negative on one side, positive on the other).
        const stepDelta = i - half;
        const dN = stepDelta * dN_per_step;
        const dE = stepDelta * dE_per_step;
        return {
          id: `${zoneId}-S${String(slotNumber).padStart(3,'0')}`,
          zoneId, slotNumber,
          sector: zoneId,
          status: isAvailable ? 'available' : 'occupied',
          coordinates: {
            lat: baseLat + dN / M_PER_DEG_LAT,
            lng: baseLng + dE / mPerDegLng,
          },
          isAccessible: [3,15].includes(slotNumber),
          lastUpdated: new Date().toISOString(),
        };
      });
    }

    function buildInitialSlots() {
      const map = {};
      for (const z of MOCK_ZONES) {
        map[z.id] = generateSlots(
          z.id, z.visualSlots, z.visualAvailable,
          z.coordinates.lat, z.coordinates.lng, z.heading ?? 90
        );
      }
      return map;
    }

    function refreshSlots(zone) {
      const total = zone.visualSlots;
      if (total === 0) return [];
      const ratio = zone.availableSlots / Math.max(1, zone.totalSlots);
      const targetAvail = Math.max(0, Math.round(total * ratio));
      const set = new Set();
      const seedAvail = [...zone.visualAvailable];
      while (set.size < targetAvail && set.size < total) {
        if (seedAvail.length && Math.random() > 0.45) set.add(seedAvail.shift());
        else set.add(Math.floor(Math.random() * total) + 1);
      }
      const slots = generateSlots(
        zone.id, total, [...set],
        zone.coordinates.lat, zone.coordinates.lng, zone.heading ?? 90
      );
      // If we already pulled the real road geometry for this zone, snap
      // the regenerated slots back onto it so the refresh doesn't undo
      // the kerb-side alignment.
      const cached = ROAD_CACHE.get(zone.id);
      if (cached) {
        const positions = placeSlotsAlongRoad(cached, zone.coordinates, total);
        if (positions) {
          return slots.map((s, i) => positions[i] ? { ...s, coordinates: positions[i] } : s);
        }
      }
      return slots;
    }

    // ── ROAD GEOMETRY (Overpass + polyline math) ─────────────────────
    // Pulls real OSM road geometry near each zone so slot pins land on
    // the kerb instead of crossing buildings. Cached in-memory.
    const ROAD_CACHE = new Map(); // zoneId -> { points:[{lat,lng}], perpDist }

    function haversineM(a, b) {
      const R = 6371000;
      const lat1 = a.lat * Math.PI / 180;
      const lat2 = b.lat * Math.PI / 180;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const x = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2)**2;
      return 2 * R * Math.asin(Math.sqrt(x));
    }

    function localMetres(latRef) {
      const mLat = M_PER_DEG_LAT;
      const mLng = M_PER_DEG_LAT * Math.cos(latRef * Math.PI / 180);
      return { mLat, mLng };
    }

    // Shortest distance (m) from a point to a single segment a-b.
    function distPointToSegment(p, a, b) {
      const { mLat, mLng } = localMetres((a.lat + b.lat) / 2);
      const ax = (a.lng - p.lng) * mLng, ay = (a.lat - p.lat) * mLat;
      const bx = (b.lng - p.lng) * mLng, by = (b.lat - p.lat) * mLat;
      const dx = bx - ax, dy = by - ay;
      const segLenSq = dx*dx + dy*dy;
      if (segLenSq < 1e-6) return Math.hypot(ax, ay);
      let t = -(ax*dx + ay*dy) / segLenSq;
      t = Math.max(0, Math.min(1, t));
      const cx = ax + t*dx, cy = ay + t*dy;
      return Math.hypot(cx, cy);
    }

    function buildPolyline(points) {
      const segments = [];
      let cum = 0;
      for (let i = 1; i < points.length; i++) {
        const len = haversineM(points[i-1], points[i]);
        segments.push({ a: points[i-1], b: points[i], start: cum, end: cum + len, len });
        cum += len;
      }
      return { points, segments, length: cum };
    }

    function pointAtDistance(poly, dist) {
      if (!poly.segments.length) return null;
      if (dist <= 0) {
        const seg = poly.segments[0];
        return { lat: seg.a.lat, lng: seg.a.lng, seg };
      }
      if (dist >= poly.length) {
        const seg = poly.segments[poly.segments.length - 1];
        return { lat: seg.b.lat, lng: seg.b.lng, seg };
      }
      for (const seg of poly.segments) {
        if (dist >= seg.start && dist <= seg.end) {
          const t = seg.len === 0 ? 0 : (dist - seg.start) / seg.len;
          return {
            lat: seg.a.lat + (seg.b.lat - seg.a.lat) * t,
            lng: seg.a.lng + (seg.b.lng - seg.a.lng) * t,
            seg,
          };
        }
      }
      return null;
    }

    // Distance (along polyline) of the closest projection of `p`.
    function projectOnPolyline(poly, p) {
      let bestPerp = Infinity, bestAt = 0;
      for (const seg of poly.segments) {
        const { mLat, mLng } = localMetres(seg.a.lat);
        const bx = (seg.b.lng - seg.a.lng) * mLng;
        const by = (seg.b.lat - seg.a.lat) * mLat;
        const px = (p.lng - seg.a.lng) * mLng;
        const py = (p.lat - seg.a.lat) * mLat;
        const segLenSq = bx*bx + by*by;
        let t = segLenSq < 1e-6 ? 0 : (px*bx + py*by) / segLenSq;
        t = Math.max(0, Math.min(1, t));
        const cx = t*bx, cy = t*by;
        const perp = Math.hypot(px - cx, py - cy);
        if (perp < bestPerp) { bestPerp = perp; bestAt = seg.start + t * seg.len; }
      }
      return { dist: bestAt, perpDist: bestPerp };
    }

    // Distribute `count` slot positions along the polyline, centered on
    // `anchor` (the zone coordinate), offset to the kerb.
    function placeSlotsAlongRoad(road, anchor, count, kerbOffsetM = 3.2, spacingM = 5.2) {
      const poly = buildPolyline(road.points);
      if (poly.length < spacingM) return null;
      const proj = projectOnPolyline(poly, anchor);
      const half = (count - 1) / 2;
      const result = [];
      for (let i = 0; i < count; i++) {
        let d = proj.dist + (i - half) * spacingM;
        if (d < 0) d = 0;
        if (d > poly.length) d = poly.length;
        const p = pointAtDistance(poly, d);
        if (!p) { result.push(null); continue; }
        const { mLat, mLng } = localMetres(p.lat);
        const dx = (p.seg.b.lng - p.seg.a.lng) * mLng;
        const dy = (p.seg.b.lat - p.seg.a.lat) * mLat;
        const len = Math.hypot(dx, dy) || 1;
        const ux = dx / len, uy = dy / len;
        // Right-hand perpendicular of forward unit vector (kerb side
        // for right-hand traffic in Azerbaijan):
        const offE = uy * kerbOffsetM;
        const offN = -ux * kerbOffsetM;
        result.push({
          lat: p.lat + offN / mLat,
          lng: p.lng + offE / mLng,
        });
      }
      return result;
    }

    async function fetchRoadForZone(zone) {
      if (ROAD_CACHE.has(zone.id)) return ROAD_CACHE.get(zone.id);
      const { lat, lng } = zone.coordinates;
      const filter = '[highway~"^(primary|secondary|tertiary|residential|unclassified|trunk|trunk_link|primary_link|secondary_link|tertiary_link|living_street|service|pedestrian)$"]';
      const query = `[out:json][timeout:10];way(around:60,${lat},${lng})${filter};out geom;`;
      const endpoints = [
        'https://overpass-api.de/api/interpreter',
        'https://overpass.kumi.systems/api/interpreter',
        'https://overpass.private.coffee/api/interpreter',
        'https://overpass.openstreetmap.fr/api/interpreter',
      ];
      for (const ep of endpoints) {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 9000);
          const res = await fetch(ep, {
            method: 'POST',
            body: 'data=' + encodeURIComponent(query),
            signal: ctrl.signal,
          });
          clearTimeout(timer);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();
          if (!json.elements || !json.elements.length) throw new Error('no roads');
          let bestPoints = null, bestPerp = Infinity;
          for (const w of json.elements) {
            if (!w.geometry || w.geometry.length < 2) continue;
            const pts = w.geometry.map(g => ({ lat: g.lat, lng: g.lon }));
            let minPerp = Infinity;
            for (let i = 1; i < pts.length; i++) {
              const d = distPointToSegment({ lat, lng }, pts[i-1], pts[i]);
              if (d < minPerp) minPerp = d;
            }
            if (minPerp < bestPerp) { bestPerp = minPerp; bestPoints = pts; }
          }
          if (!bestPoints) throw new Error('no closest road');
          const data = { points: bestPoints, perpDist: bestPerp };
          ROAD_CACHE.set(zone.id, data);
          return data;
        } catch (e) {
          // try next endpoint
        }
      }
      return null; // network blocked / offline → keep heading fallback
    }

      try {

}`,

Ən yaxın və əlverişli slotu tövsiyə et.` }],

              {filteredZones.map((z, i) => (
                <div key={z.id} style={{animationDelay:`${i*60}ms`}} className="animate-fade-in">
                  <ZoneCard zone={z} highlighted={aiRec?.recommendedZoneId===z.id} onClick={()=>onZoneSelect(z.id)}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── SLOT STRIP ─────────────────────────────────────────────────
    function SlotCard({ slot, isSelected, onClick }) {
      const base = 'flex-shrink-0 w-[72px] h-[92px] rounded-2xl flex flex-col items-center justify-center font-display font-extrabold transition-all relative';
      if (slot.status === 'available') {
        return (
          <button onClick={onClick}
            className={`${base} ${isSelected?'bg-az-primary text-white scale-[1.12] shadow-glow-green ring-2 ring-white animate-pulse-slot':'bg-az-available text-white hover:scale-[1.05] shadow-md'}`}>
            <span className="text-[22px] leading-none">{slot.slotNumber}</span>
            <span className="text-[9px] mt-1.5 tracking-widest opacity-90">{isSelected?'SİZİN':'BOŞ'}</span>
            {isSelected && <span className="absolute -top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-full bg-white text-az-primary text-[8px] font-extrabold shadow whitespace-nowrap">🎯 SLOT</span>}
          </button>
        );
      }
      return (
        <button disabled className={`${base} bg-az-occupied-bg border-2 border-az-occupied/40 text-az-ink-soft cursor-not-allowed`}>
          <span className="text-[22px] leading-none">{slot.slotNumber}</span>
          <span className="text-[9px] mt-1.5 tracking-widest opacity-80">DOLU</span>
        </button>
      );
    }

    function SlotStrip({ slots, selectedId, onSelect }) {
      const refs = useRef({});
      useEffect(() => {
        if (!selectedId) return;
        const el = refs.current[selectedId];
        if (el && el.scrollIntoView) {
          el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        }
      }, [selectedId]);
      return (
        <div
          className="overflow-x-auto overflow-y-hidden scrollbar-hide flex gap-2.5 px-5 py-3"
          style={{ touchAction: 'pan-x', WebkitOverflowScrolling: 'touch', overscrollBehaviorX: 'contain' }}
          onWheel={(e) => {
            // Allow vertical wheel/trackpad to scroll horizontally inside the strip
            if (e.deltaY !== 0 && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
              e.currentTarget.scrollLeft += e.deltaY;
            }
          }}
        >
          {slots.map(s => (
            <div key={s.id} ref={el => refs.current[s.id] = el}>
              <SlotCard slot={s} isSelected={s.id===selectedId} onClick={s.status==='available'?()=>onSelect(s):undefined}/>
            </div>
          ))}
        </div>
      );
    }

    // ── 3D STREET-SIDE PARK SCHEME (linear, kerb-style) ───────────
    // Top-down perspective of a city street with parallel parking slots
    // arranged side by side along the curb. Single horizontal row,
    // horizontally scrollable. Matches the user's reference photo.

    function CarTopShape({ cx, cy, w, h, color = '#475569' }) {
      // Top-down silhouette of a parked car (simple, readable).
      return (
        <g transform={`translate(${cx-w/2}, ${cy-h/2})`} style={{pointerEvents:'none'}}>
          {/* body */}
          <rect x={1.5} y={0} width={w-3} height={h} rx={5.5} fill={color}/>
          {/* roof highlight */}
          <rect x={3} y={h*0.18} width={w-6} height={h*0.28} rx={2} fill="#1F2937" opacity="0.55"/>
          <rect x={3} y={h*0.54} width={w-6} height={h*0.28} rx={2} fill="#1F2937" opacity="0.55"/>
          {/* windshield gleam */}
          <rect x={4} y={h*0.21} width={w-8} height={h*0.05} fill="#94A3B8" opacity="0.7"/>
          <rect x={4} y={h*0.74} width={w-8} height={h*0.05} fill="#94A3B8" opacity="0.7"/>
          {/* mirrors */}
          <rect x={-0.5} y={h*0.36} width={2} height={3} rx={1} fill={color}/>
          <rect x={w-1.5} y={h*0.36} width={2} height={3} rx={1} fill={color}/>
        </g>
      );
    }

    function StreetSlot({ slot, x, W, H, isSelected, onClick }) {
      const isAvail = slot.status === 'available';
      // Slot tinting
      const fill   = isAvail ? (isSelected ? '#16A34A' : '#86EFAC') : '#E5E7EB';
      const stroke = isAvail ? (isSelected ? '#0F4C3A' : '#22C55E') : '#9CA3AF';
      const strokeW = isSelected ? 3 : 1.5;
      const carColor = ['#475569', '#1E40AF', '#7F1D1D', '#0F172A', '#374151'][slot.slotNumber % 5];

      return (
        <g transform={`translate(${x}, 0)`}
           style={{cursor: isAvail ? 'pointer' : 'not-allowed'}}
           onClick={isAvail ? onClick : undefined}>
          {/* selected outer halo */}
          {isSelected && (
            <rect x={-4} y={-4} width={W+8} height={H+8} rx={9}
                  fill="none" stroke="#16A34A" strokeWidth={2}
                  opacity={0.55} className="animate-halo"/>
          )}
          {/* slot body */}
          <rect width={W} height={H} rx={5} fill={fill}
                stroke={stroke} strokeWidth={strokeW}/>
          {/* white parking lines (left & right edges) — like real road markings */}
          <rect x={1.5} y={3} width={1.5} height={H-6} fill="#FFFFFF" opacity={0.85}/>
          <rect x={W-3}  y={3} width={1.5} height={H-6} fill="#FFFFFF" opacity={0.85}/>
          {/* curb hint (top edge thin yellow line where road meets slots) */}
          <rect x={0} y={0} width={W} height={2} fill="#FBBF24" opacity={0.55}/>

          {/* occupied → top-down car silhouette */}
          {!isAvail && <CarTopShape cx={W/2} cy={H/2} w={W*0.66} h={H*0.78} color={carColor}/>}

          {/* available → big slot number */}
          {isAvail && (
            <text x={W/2} y={H/2 + 5} textAnchor="middle"
                  fontSize={isSelected ? 18 : 16} fontWeight={800}
                  fill={isSelected ? '#FFFFFF' : '#0F4C3A'}
                  style={{pointerEvents:'none'}}>
              {slot.slotNumber}
            </text>
          )}

          {/* number badge under each slot */}
          <g transform={`translate(${W/2 - 11}, ${H + 3})`} style={{pointerEvents:'none'}}>
            <rect width={22} height={12} rx={6}
                  fill={isSelected ? '#0F4C3A' : (isAvail ? '#FFFFFF' : '#F3F4F6')}
                  stroke={isAvail ? '#16A34A' : '#9CA3AF'} strokeWidth={0.7}/>
            <text x={11} y={9} textAnchor="middle" fontSize={8.5} fontWeight={800}
                  fill={isSelected ? '#FFFFFF' : (isAvail ? '#0F4C3A' : '#6B7280')}>
              {slot.slotNumber}
            </text>
          </g>

          {/* selected callout above */}
          {isSelected && (
            <g transform={`translate(${W/2 - 32}, ${-22})`} style={{pointerEvents:'none'}}>
              <rect width={64} height={15} rx={3.5} fill="#0F4C3A"/>
              <text x={32} y={10.4} textAnchor="middle" fontSize={8.5}
                    fontWeight={800} fill="#FFFFFF" letterSpacing={0.4}>
                🎯 SİZİN SLOT
              </text>
              <path d={`M 28 15 L 32 19 L 36 15 Z`} fill="#0F4C3A"/>
            </g>
          )}
        </g>
      );
    }

    function StreetScheme({ slots, selectedId, onSelect }) {
      // ── Hooks MUST be called unconditionally on every render ─────────
      const containerRef = useRef(null);
      const isEmpty = !slots || slots.length === 0;

      // Layout constants (computed every render, cheap)
      const SW = 56;        // slot width
      const SH = 92;        // slot depth
      const GAP = 4;        // gap between slots
      const ROAD_H = 38;    // road height
      const PAD_X = 18;
      const PAD_TOP = 28;   // room for "SİZİN SLOT" callout
      const PAD_BOT = 30;   // room for slot # badge + sidewalk

      // Auto-scroll selected slot into view
      useEffect(() => {
        if (isEmpty) return;
        if (!selectedId || !containerRef.current) return;
        const idx = slots.findIndex(s => s.id === selectedId);
        if (idx < 0) return;
        const target = PAD_X + idx * (SW + GAP) + SW / 2;
        const c = containerRef.current;
        const goal = Math.max(0, target - c.clientWidth / 2);
        try { c.scrollTo({ left: goal, behavior: 'smooth' }); }
        catch { c.scrollLeft = goal; }
      }, [selectedId, slots, isEmpty]);

      // Now it is safe to early-return for the empty state.
      if (isEmpty) {
        return (
          <div className="mx-5 rounded-2xl shadow-card bg-white p-8 text-center text-az-ink-soft text-sm">
            Bu zonada slot mövcud deyil
          </div>
        );
      }

      const totalSlotsW = slots.length * (SW + GAP) - GAP;
      const w = totalSlotsW + PAD_X * 2;
      const h = PAD_TOP + ROAD_H + 6 + SH + PAD_BOT;
      const ROAD_Y     = PAD_TOP;
      const SLOTS_Y    = PAD_TOP + ROAD_H + 6;
      const SIDEWALK_Y = SLOTS_Y + SH + 18;
      const dashCount  = Math.ceil(w / 36);

      return (
        <div className="relative mx-5 rounded-2xl shadow-card border border-az-primary/5 overflow-hidden bg-gradient-to-b from-[#E7F0EA] to-[#F0F4F0]">
          {/* Title pill */}
          <div className="absolute top-3 left-3 z-10 flex items-center gap-1.5 bg-white/95 backdrop-blur px-2.5 py-1 rounded-full shadow-sm">
            <span className="w-1.5 h-1.5 rounded-full bg-az-available animate-soft-pulse"/>
            <span className="text-[10px] font-display font-bold text-az-primary tracking-wide">KÜÇƏ SXEMİ · 3D</span>
          </div>
          {/* Legend */}
          <div className="absolute top-3 right-3 z-10 flex items-center gap-2 bg-white/95 backdrop-blur px-2.5 py-1 rounded-full shadow-sm">
            <span className="flex items-center gap-1 text-[10px] font-bold text-az-available">
              <span className="w-2 h-2 rounded-sm bg-az-available"/> Boş
            </span>
            <span className="flex items-center gap-1 text-[10px] font-bold text-az-ink-soft">
              <span className="w-2 h-2 rounded-sm bg-az-occupied"/> Dolu
            </span>
          </div>
          {/* Scroll hint chevron (right) */}
          <div className="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 z-10 text-az-primary/40 animate-soft-pulse">
            <ChevronRight size={20}/>
          </div>

          <div
            ref={containerRef}
            className="overflow-x-auto overflow-y-hidden scrollbar-hide"
            style={{ touchAction: 'pan-x', WebkitOverflowScrolling: 'touch', overscrollBehaviorX: 'contain' }}
            onWheel={(e) => {
              if (e.deltaY !== 0 && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                e.currentTarget.scrollLeft += e.deltaY;
              }
            }}
          >
            <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}
                 preserveAspectRatio="xMinYMid meet"
                 style={{display:'block'}}>
              <defs>
                <linearGradient id="asphalt" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stopColor="#4B5563"/>
                  <stop offset="100%" stopColor="#374151"/>
                </linearGradient>
                <linearGradient id="sidewalk" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"  stopColor="#E5E7EB"/>
                  <stop offset="100%" stopColor="#D1D5DB"/>
                </linearGradient>
              </defs>

              {/* asphalt road */}
              <rect x={0} y={ROAD_Y} width={w} height={ROAD_H} fill="url(#asphalt)"/>
              {/* yellow center dashes */}
              {Array.from({length: dashCount}).map((_, k) => (
                <rect key={k} x={k*36 + 6} y={ROAD_Y + ROAD_H/2 - 1.6}
                      width={20} height={3.2} rx={1} fill="#FCD34D"/>
              ))}
              {/* white edge line where road meets parking */}
              <rect x={0} y={ROAD_Y + ROAD_H} width={w} height={2} fill="#FFFFFF" opacity={0.9}/>

              {/* parking slots */}
              <g transform={`translate(0, ${SLOTS_Y})`}>
                {slots.map((s, i) => (
                  <StreetSlot key={s.id}
                              slot={s}
                              x={PAD_X + i * (SW + GAP)}
                              W={SW} H={SH}
                              isSelected={s.id === selectedId}
                              onClick={() => onSelect(s)}/>
                ))}
              </g>

              {/* sidewalk */}
              <rect x={0} y={SIDEWALK_Y} width={w} height={6} fill="url(#sidewalk)"/>
              <rect x={0} y={SIDEWALK_Y + 6} width={w} height={4} fill="#9CA3AF" opacity={0.4}/>
              {/* sidewalk tile lines */}
              {Array.from({length: Math.ceil(w / 24)}).map((_, k) => (
                <rect key={k} x={k*24} y={SIDEWALK_Y} width={1} height={6} fill="#9CA3AF" opacity={0.5}/>
              ))}
            </svg>
          </div>
        </div>
      );
    }

    // Backward-compat alias (the rest of the app calls IsometricScheme)
    const IsometricScheme = StreetScheme;

    // ── LEAFLET MAP ────────────────────────────────────
    // SVG used for the live user-location marker (blue pulsing dot).
    const USER_DOT_HTML = (
      '<div style="position:relative;width:22px;height:22px;">' +
        '<span style="position:absolute;inset:0;border-radius:50%;background:#3B82F6;opacity:.35;animation:azUserPulse 1.6s ease-out infinite;"></span>' +
        '<span style="position:absolute;left:5px;top:5px;width:12px;height:12px;border-radius:50%;background:#3B82F6;border:2px solid #fff;box-shadow:0 0 0 2px rgba(59,130,246,.35),0 2px 6px rgba(0,0,0,.25);"></span>' +
      '</div>'
    );

    function LeafletMap({ zone, slots, selectedSlot, onSelectSlot, userLocation, nearestSlot }) {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      const slotLayerRef = useRef(null);
      const selectedPinRef = useRef(null);
      const userMarkerRef = useRef(null);
      const aliveRef = useRef(false);
      const selectHandlerRef = useRef(onSelectSlot);
      useEffect(() => { selectHandlerRef.current = onSelectSlot; }, [onSelectSlot]);

      const nearestId = nearestSlot && nearestSlot.zone.id === zone.id ? nearestSlot.slot.id : null;

      useEffect(() => {
        if (!containerRef.current) return;
        if (typeof window === 'undefined' || !window.L) return;
        const L = window.L;
        const map = L.map(containerRef.current, {
          zoomControl:true, attributionControl:true, preferCanvas:true,
          fadeAnimation:false, zoomAnimation:true, markerZoomAnimation:false,
        }).setView([zone.coordinates.lat, zone.coordinates.lng], 19);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom:20, attribution:'&copy; OpenStreetMap',
        }).addTo(map);
        slotLayerRef.current = L.layerGroup().addTo(map);
        mapRef.current = map;
        aliveRef.current = true;
        const t = setTimeout(() => { try { map.invalidateSize(); } catch(_) {} }, 250);
        return () => {
          aliveRef.current = false;
          clearTimeout(t);
          // Cancel any in-flight zoom/pan animation before tearing the map down,
          // otherwise an animation-end callback can fire post-remove and throw
          // "Cannot read properties of undefined (reading '_leaflet_pos')".
          try { map.stop(); } catch(_) {}
          try { map.off(); } catch(_) {}
          try { map.remove(); } catch(_) {}
          mapRef.current = null; slotLayerRef.current = null; selectedPinRef.current = null; userMarkerRef.current = null;
        };
      }, [zone.id, zone.coordinates.lat, zone.coordinates.lng]);

      useEffect(() => {
        const L = window.L;
        if (!L || !mapRef.current || !slotLayerRef.current) return;
        slotLayerRef.current.clearLayers();
        slots.forEach((s, idx) => {
          const colorMain = s.status==='available' ? '#16A34A' : '#9CA3AF';
          const isNearest = s.id === nearestId;
          const ring = isNearest
            ? 'box-shadow:0 0 0 3px #3B82F6,0 0 0 6px rgba(59,130,246,.35),0 2px 6px rgba(0,0,0,0.25);animation:azNearestRing 1.4s ease-in-out infinite;'
            : 'box-shadow:0 2px 6px rgba(0,0,0,0.25);';
          const html = `
            <div style="position:relative;animation:fadeIn .35s ${idx*30}ms both;">
              <div style="width:24px;height:24px;border-radius:50%;background:${colorMain};
                border:2px solid #fff;${ring}
                display:flex;align-items:center;justify-content:center;
                color:#fff;font-weight:800;font-size:10px;font-family:Inter,sans-serif;">
                ${s.slotNumber}
              </div>
            </div>`;
          const icon = L.divIcon({ html, className:'az-marker', iconSize:[24,24], iconAnchor:[12,12] });
          const m = L.marker([s.coordinates.lat, s.coordinates.lng], { icon });
          if (s.status === 'available') m.on('click', () => selectHandlerRef.current?.(s));
          m.addTo(slotLayerRef.current);
        });
      }, [slots, nearestId]);

      // Live user location marker.
      useEffect(() => {
        const L = window.L;
        if (!L || !mapRef.current || !aliveRef.current) return;
        if (userMarkerRef.current) {
          try { mapRef.current.removeLayer(userMarkerRef.current); } catch(_) {}
          userMarkerRef.current = null;
        }
        if (!userLocation) return;
        try {
          const icon = L.divIcon({ html: USER_DOT_HTML, className: 'az-user-marker', iconSize:[22,22], iconAnchor:[11,11] });
          const m = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 900, interactive: false });
          m.addTo(mapRef.current);
          userMarkerRef.current = m;
        } catch(_) {}
      }, [userLocation]);

      useEffect(() => {
        const L = window.L;
        if (!L || !mapRef.current || !aliveRef.current) return;
        if (selectedPinRef.current) {
          try { mapRef.current.removeLayer(selectedPinRef.current); } catch(_) {}
          selectedPinRef.current = null;
        }
        if (!selectedSlot) return;
        const html = `
          <div style="position:relative;display:flex;flex-direction:column;align-items:center;transform:translateY(-12px);">
            <div style="background:#fff;border:2px solid #16A34A;border-radius:14px;
              padding:3px 9px;font-size:11px;font-weight:800;color:#0F4C3A;
              font-family:'Plus Jakarta Sans',sans-serif;
              display:flex;align-items:center;gap:5px;
              box-shadow:0 4px 10px rgba(15,76,58,0.25);white-space:nowrap;">
              Slot ${selectedSlot.slotNumber}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14-9-5 18-3-7-6-2z"/></svg>
            </div>
            <svg width="34" height="44" viewBox="0 0 34 44" style="filter:drop-shadow(0 4px 8px rgba(220,38,38,0.4));margin-top:-2px;">
              <path d="M17 2 C8 2 2 8 2 17 c0 11 15 25 15 25 s15-14 15-25 C32 8 26 2 17 2z" fill="#DC2626" stroke="#fff" stroke-width="2"/>
              <circle cx="17" cy="17" r="6" fill="#fff"/>
              <circle cx="17" cy="17" r="3" fill="#DC2626"/>
            </svg>
          </div>`;
        try {
          const icon = L.divIcon({ html, className:'az-marker', iconSize:[80,60], iconAnchor:[40,50] });
          const pin = L.marker([selectedSlot.coordinates.lat, selectedSlot.coordinates.lng], { icon, zIndexOffset:1000 });
          pin.addTo(mapRef.current);
          selectedPinRef.current = pin;
          mapRef.current.flyTo(
            [selectedSlot.coordinates.lat, selectedSlot.coordinates.lng],
            20, { duration:1.2, animate:true }
          );
        } catch(_) { /* swallow rare race when the map is being torn down */ }
      }, [selectedSlot]);

      const recenterOnMe = useCallback(() => {
        if (!userLocation || !mapRef.current || !aliveRef.current) return;
        try {
          mapRef.current.flyTo([userLocation.lat, userLocation.lng], 18, { duration: 1.0 });
        } catch(_) {}
      }, [userLocation]);

      return (
        <div className="mx-5 rounded-2xl overflow-hidden shadow-card border border-az-primary/10 relative">
          <div ref={containerRef} className="w-full h-[220px]"/>
          <div className="absolute top-2.5 left-2.5 z-[400] bg-white/95 backdrop-blur px-2.5 py-1 rounded-full shadow-sm flex items-center gap-1.5 pointer-events-none">
            <MapPin size={11} className="text-az-selected"/>
            <span className="text-[10px] font-display font-bold text-az-primary">XƊRİTƊ · BAKI</span>
          </div>
          {userLocation && (
            <button onClick={recenterOnMe} aria-label="Mənim konumum"
              className="absolute bottom-2.5 right-2.5 z-[400] w-9 h-9 rounded-xl bg-white shadow-md flex items-center justify-center text-blue-600 hover:bg-blue-50 active:scale-95 transition">
              <Target size={16}/>
            </button>
          )}
          {nearestSlot && nearestSlot.zone.id === zone.id && (
            <div className="absolute bottom-2.5 left-2.5 z-[400] bg-blue-600/95 text-white px-2.5 py-1 rounded-full shadow-md flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-white animate-soft-pulse"/>
              <span className="text-[10px] font-display font-bold tracking-wide">ƊN YAXIN · SLOT {nearestSlot.slot.slotNumber} · {fmtDistance(nearestSlot.distance)}</span>
            </div>
          )}
        </div>
      );
    }

    // ── ZONE DETAIL SCREEN ─────────────────────────────────────────
    function ZoneDetailHeader({ zone, onBack, onRefresh, refreshing, availableCount }) {
      return (
        <div className="px-4 pt-1 pb-2 flex items-start justify-between bg-az-bg flex-shrink-0">
          <div className="flex items-start gap-2">
            <button onClick={onBack} aria-label="Geri"
              className="w-9 h-9 rounded-xl bg-white shadow-sm flex items-center justify-center text-az-primary hover:bg-az-primary hover:text-white transition mt-0.5">
              <ChevronLeft size={20}/>
            </button>
            <div className="leading-tight">
              <p className="font-display font-extrabold text-az-ink text-[18px] tracking-tight">{zone.code} Sektoru</p>
              <p className="text-[11px] text-az-ink-soft">
                Real-vaxt slot görüntüsü · <span className="text-az-available font-bold">{availableCount} boş slot</span>
              </p>
            </div>
          </div>
          <button onClick={onRefresh} aria-label="Yenilə"
            className="w-9 h-9 rounded-xl bg-white shadow-sm flex items-center justify-center text-az-primary hover:bg-az-primary hover:text-white transition">
            <RefreshCw size={17} className={refreshing?'animate-spin':''}/>
          </button>
        </div>
      );
    }

    // PARK ET — primary action that opens the payment screen.
    function ParkEtButton({ slot, onClick }) {
      const disabled = !slot;
      return (
        <button onClick={onClick} disabled={disabled}
          className={`mx-5 mt-3 h-[60px] w-[calc(100%-40px)] rounded-2xl flex items-center justify-center gap-2.5 font-display font-extrabold text-[16px] tracking-tight transition active:scale-[0.97] ${disabled
            ? 'bg-az-occupied/40 text-az-ink-soft cursor-not-allowed'
            : 'bg-az-available hover:bg-az-available-light text-white shadow-lg shadow-az-available/30'}`}>
          <Car size={20} className={disabled?'':'fill-white'}/>
          {disabled ? 'Əvvəlcə slot seçin' : `PARK ET (Slot ${slot.slotNumber})`}
        </button>
      );
    }

    // WAZE — secondary action shown next to Park Et.
    function WazeButton({ slot, onClick }) {
      const disabled = !slot;
      return (
        <button onClick={onClick} disabled={disabled}

    // ── PAYMENT MODAL (Parklanma əməliyyatı) ─────────────────────────

      { id:'1h',  label:'1 saat', minutes: 60 },
      { id:'2h',  label:'2 saat', minutes: 120 },

      { id:'4h',  label:'4 saat', minutes: 240 },

    // ── PROXIMITY MODAL + CONFETTI ─────────────────────────────────
    const CONFETTI_COLORS = ['#16A34A','#22C55E','#FBBF24','#DC2626','#0F4C3A','#3B82F6','#F97316','#A855F7'];
    function Confetti() {
      const pieces = useMemo(() => Array.from({length: 80}, (_, i) => ({
        id:i, left: Math.random()*100, delay: Math.random()*0.5,
        duration: 2.4 + Math.random()*1.6,
        color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
        w: 6 + Math.random()*8, h: 8 + Math.random()*12,
        rotate: Math.random()*360,
      })), []);
      return (
        <div className="fixed inset-0 pointer-events-none z-[300] overflow-hidden">
          {pieces.map(p => (
            <span key={p.id} style={{
              position:'absolute', left:p.left+'%', top:'-12vh',
              width:p.w+'px', height:p.h+'px', background:p.color,
              transform:`rotate(${p.rotate}deg)`,
              animation:`confettiFall ${p.duration}s ease-in ${p.delay}s forwards`,
              borderRadius:'2px', boxShadow:'0 0 6px rgba(0,0,0,0.08)',
            }}/>
          ))}
        </div>
      );
    }

    function MiniSlot({ slot, isCenter }) {

                <span className="text-[10px] mt-2 tracking-widest font-bold opacity-95">SİZİN</span>
              </div>

      let cls = '', label = 'BOŞ';

    // ── FULL-PAGE MAP SCREEN (Xəritə tab) ──────────────────────────
    function FullMapScreen({ zones, onSelectZone, userLocation, nearestSlot }) {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      const userMarkerRef = useRef(null);
      const nearestLineRef = useRef(null);
      const aliveRef = useRef(false);

      // Bounds derived from the zone list — we use them both for the
      // initial viewport and for the "HAMISI" button.
      const cityBounds = useMemo(() => {
        if (!zones.length) return null;
        const lats = zones.map(z => z.coordinates.lat);
        const lngs = zones.map(z => z.coordinates.lng);
        return [
          [Math.min(...lats), Math.min(...lngs)],
          [Math.max(...lats), Math.max(...lngs)],
        ];
      }, [zones]);

      useEffect(() => {
        const L = window.L;
        if (!L || !containerRef.current) return;
        const map = L.map(containerRef.current, {
          zoomControl: false, attributionControl: false,
          fadeAnimation:false, zoomAnimation:true, markerZoomAnimation:false,
        });
        mapRef.current = map;
        aliveRef.current = true;
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
        // Frame all zones across the city.
        if (cityBounds) {
          map.fitBounds(cityBounds, { padding: [40, 40], maxZoom: 14 });
        } else {
          map.setView([40.378, 49.853], 13);
        }
        const nearestZoneId = nearestSlot ? nearestSlot.zone.id : null;
        zones.forEach(z => {
          const isNearestZone = z.id === nearestZoneId;
          const colour = isNearestZone ? '#3B82F6' : (z.availableSlots > 0 ? '#16A34A' : '#9CA3AF');
          const ringStyle = isNearestZone
            ? 'box-shadow:0 0 0 3px #fff,0 0 0 6px rgba(59,130,246,.45);animation:azNearestRing 1.4s ease-in-out infinite;'
            : 'box-shadow:0 4px 10px rgba(0,0,0,0.18);';
          const html =
            '<div style="position:relative;">' +
              '<div style="background:' + colour + ';color:#fff;padding:5px 10px;border-radius:14px;font:800 11px Inter,sans-serif;' + ringStyle + 'white-space:nowrap;border:2px solid #fff;">' +
                z.code + ' · ' + z.availableSlots +
              '</div>' +
              '<div style="width:0;height:0;margin:2px auto 0;border:6px solid transparent;border-top-color:' + colour + ';"></div>' +
            '</div>';
          const icon = L.divIcon({ html, className: 'az-zone-marker', iconSize: [1,1], iconAnchor: [0, 36] });
          L.marker([z.coordinates.lat, z.coordinates.lng], { icon })
            .addTo(map)
            .on('click', () => onSelectZone(z.id));
        });
        return () => {
          aliveRef.current = false;
          try { map.stop(); } catch(_) {}
          try { map.off(); } catch(_) {}
          try { map.remove(); } catch(_) {}
          mapRef.current = null; userMarkerRef.current = null; nearestLineRef.current = null;
        };
      }, [zones, onSelectZone, nearestSlot]);

      // User dot
      useEffect(() => {
        const L = window.L;
        if (!L || !mapRef.current || !aliveRef.current) return;
        if (userMarkerRef.current) {
          try { mapRef.current.removeLayer(userMarkerRef.current); } catch(_) {}
          userMarkerRef.current = null;
        }
        if (!userLocation) return;
        try {
          const icon = L.divIcon({ html: USER_DOT_HTML, className: 'az-user-marker', iconSize:[22,22], iconAnchor:[11,11] });
          const m = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 900, interactive: false });
          m.addTo(mapRef.current);
          userMarkerRef.current = m;
        } catch(_) {}
      }, [userLocation]);

      // Dashed line from user → nearest available slot.
      useEffect(() => {
        const L = window.L;
        if (!L || !mapRef.current || !aliveRef.current) return;
        if (nearestLineRef.current) {
          try { mapRef.current.removeLayer(nearestLineRef.current); } catch(_) {}
          nearestLineRef.current = null;
        }
        if (!userLocation || !nearestSlot) return;
        try {
          const line = L.polyline(
            [[userLocation.lat, userLocation.lng], [nearestSlot.slot.coordinates.lat, nearestSlot.slot.coordinates.lng]],
            { color: '#3B82F6', weight: 3, dashArray: '6, 8', opacity: 0.9 }
          );
          line.addTo(mapRef.current);
          nearestLineRef.current = line;
        } catch(_) {}
      }, [userLocation, nearestSlot]);

      const recenterOnMe = useCallback(() => {
        if (!userLocation || !mapRef.current || !aliveRef.current) return;

      const showAll = useCallback(() => {

      return (

    // ── APP (state machine) ────────────────────────────────────────
    function App() {
      const [view, setView] = useState('splash');
      const [selectedZoneId, setSelectedZoneId] = useState(null);
      const [selectedSlotId, setSelectedSlotId] = useState(null);
      const [zoneSlots, setZoneSlots] = useState(buildInitialSlots);
      const [aiRec, setAiRec] = useState(null);
      const [aiLoading, setAiLoading] = useState(true);
      const [proximityOpen, setProximityOpen] = useState(false);
      const [paymentOpen,  setPaymentOpen]   = useState(false);
      const [showConfetti, setShowConfetti]  = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [accessibilityFilter, setAccessibilityFilter] = useState(false);
      const [tab, setTab] = useState('zones');
      const [refreshing, setRefreshing] = useState(false);

      // ── user / wallet / sessions ──────────────────────────────
      const USER = { name:'Mustafa M.', initial:'M', phone:'+994 50 *** ** 21' };
      const [balance, setBalance] = useState(25.00);
      const [userCar, setUserCar] = useState('99-AA-999');
      const [activeSession, setActiveSession] = useState(null);
      const [parkingHistory, setParkingHistory] = useState([
        { id:'h1', zoneName:'Atatürk pr. - Mərkəzi xətt',     slotNumber:31, date:'24 apr 2026', duration:'1 saat', totalAZN:1.00 },
        { id:'h2', zoneName:'Fəvvarələr Meydanı - Nizami küç.', slotNumber:7,  date:'21 apr 2026', duration:'2 saat', totalAZN:3.00 },
        { id:'h3', zoneName:'Sahil Bulvarı - Mərkəzi giriş',  slotNumber:14, date:'18 apr 2026', duration:'30 dəq', totalAZN:0.50 },
      ]);
      const [toast, setToast] = useState(null);
      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2200);
      }, []);

      // ── live user location (geolocation watch) ──────────────────
      const [userLocation, setUserLocation] = useState(null);
      const [geoError, setGeoError] = useState(null);
      useEffect(() => {
        if (typeof navigator === 'undefined' || !('geolocation' in navigator)) {
          setGeoError('unsupported');
          return;
        }
        const watchId = navigator.geolocation.watchPosition(
          (pos) => {
            setUserLocation({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              ts: pos.timestamp,
            });
            setGeoError(null);
          },
          (err) => {
            setGeoError(err.code === 1 ? 'denied' : err.code === 3 ? 'timeout' : 'error');
          },
          { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
        return () => { try { navigator.geolocation.clearWatch(watchId); } catch(_) {} };
      }, []);

      // ── snap slot coordinates to real OSM road geometry ────────
      // Runs once at mount with limited concurrency so Overpass doesn't
      // rate-limit us when there are many zones across the city.
      // Updates are flushed per-batch so the user sees pins snap into
      // place progressively rather than waiting for the whole city.
      useEffect(() => {
        let cancelled = false;
        const CONCURRENCY = 3;
        (async () => {
          const queue = [...MOCK_ZONES];
          async function worker() {
            while (!cancelled && queue.length) {
              const z = queue.shift();
              const road = await fetchRoadForZone(z);
              if (cancelled || !road) continue;
              const positions = placeSlotsAlongRoad(road, z.coordinates, z.visualSlots);
              if (!positions) continue;
              setZoneSlots((prev) => {
                if (!prev[z.id]) return prev;
                return {
                  ...prev,
                  [z.id]: prev[z.id].map((s, i) =>
                    positions[i] ? { ...s, coordinates: positions[i] } : s
                  ),
                };
              });
            }
          }
          await Promise.all(Array.from({ length: CONCURRENCY }, worker));
        })();
        return () => { cancelled = true; };
      }, []);

      // Bottom-nav highlight is derived directly from the current view.
      const activeNav = (
        view === 'home' || view === 'zone_detail' ? 'parking'
        : view === 'vaxt'   ? 'vaxt'
        : view === 'xerite' ? 'xerite'
        : view === 'diger'  ? 'diger'
        : view === 'profil' ? 'profil'
        : 'parking'
      );

      useEffect(() => {
        if (view !== 'home' || aiRec) return;
        let cancelled = false;
        setAiLoading(true);
        fetchAIRecommendation().then(rec => {
          if (!cancelled) { setAiRec(rec); setAiLoading(false); }
        });
        return () => { cancelled = true; };
      }, [view, aiRec]);

      const selectedZone = useMemo(() => MOCK_ZONES.find(z => z.id === selectedZoneId) || null, [selectedZoneId]);
      const slotsForZone = selectedZoneId ? zoneSlots[selectedZoneId] : [];
      const selectedSlot = useMemo(() => slotsForZone?.find(s => s.id === selectedSlotId) || null, [slotsForZone, selectedSlotId]);

      // Closest available slot across all zones, relative to user.
      const nearestAvailableSlot = useMemo(() => {
        if (!userLocation) return null;
        let best = null, bestDist = Infinity;
        for (const z of MOCK_ZONES) {
          const list = zoneSlots[z.id] || [];
          for (const s of list) {
            if (s.status !== 'available') continue;
            const d = haversineM(userLocation, s.coordinates);
            if (d < bestDist) { bestDist = d; best = { slot: s, zone: z, distance: d }; }
          }
        }
        return best;
      }, [userLocation, zoneSlots]);

      const handleZoneSelect = useCallback((zoneId) => {
        setSelectedZoneId(zoneId); setSelectedSlotId(null);
        setView('zone_detail');
      }, []);

      const handleAIGo = useCallback(() => {
        if (!aiRec) return;
        setSelectedZoneId(aiRec.recommendedZoneId);
        setSelectedSlotId(aiRec.recommendedSlotId);
        setView('zone_detail');
      }, [aiRec]);

      const handleSelectSlot = useCallback((slot) => {
        if (!slot || slot.status !== 'available') return;
        setSelectedSlotId(slot.id);
      }, []);

      const handleRefresh = useCallback(() => {
        if (!selectedZone) return;
        setRefreshing(true);
        setTimeout(() => {
          setZoneSlots(prev => ({ ...prev, [selectedZone.id]: refreshSlots(selectedZone) }));
          setSelectedSlotId(null);
          setRefreshing(false);
        }, 600);
      }, [selectedZone]);

      const handleBack = useCallback(() => { setView('home'); }, []);

      // Park Et tapped on the zone-detail screen → open payment sheet.
      const handleOpenPayment = useCallback(() => {
        if (!selectedSlot) return;
        setPaymentOpen(true);
      }, [selectedSlot]);

      // Təsdiq edin tapped inside the payment modal → confirm + park.
      const handleConfirmPayment = useCallback((details) => {
        if (!selectedZone || !selectedSlot) return;
        setShowConfetti(true);

        // Mark the slot as occupied on the live board.
        setZoneSlots(prev => ({
          ...prev,
          [selectedZone.id]: prev[selectedZone.id].map(s =>
            s.id === selectedSlot.id ? { ...s, status:'occupied' } : s),
        }));

        // Persist car plate & deduct wallet balance when applicable.
        if (details.carPlate && details.carPlate !== 'GUEST') setUserCar(details.carPlate);
        if (details.payMethod === 'wallet' && details.totalAZN > 0) {
          setBalance(b => Math.max(0, +(b - details.totalAZN).toFixed(2)));
        }

        // Create / replace the active session.
        const dur = DURATIONS.find(d => d.id === details.durationId) || DURATIONS[1];
        const now = new Date();
        const startedLabel = now.toLocaleTimeString('az-AZ', { hour:'2-digit', minute:'2-digit' });
        setActiveSession({
          id: 'sess-' + now.getTime(),
          zoneId: selectedZone.id,
          zoneName: selectedZone.name,
          slotNumber: selectedSlot.slotNumber,
          carPlate: details.carPlate || userCar,
          payMethod: details.payMethod,
          payTiming: details.payTiming,
          totalAZN: details.totalAZN || 0,
          durationLabel: dur.label,
          durationMinutes: dur.minutes,
          startedAt: now.toISOString(),
          startedLabel,
        });

        setTimeout(() => {
          setPaymentOpen(false);
          setProximityOpen(false);
          setSelectedSlotId(null);
          showToast('Parklanma təsdiq edildi ✅');
        }, 1100);
        setTimeout(() => setShowConfetti(false), 3200);
      }, [selectedZone, selectedSlot, userCar, showToast]);

      // Bottom-nav tap → switch top-level view.
      const handleNavChange = useCallback((id) => {
        if (id === 'parking') setView('home');
        else if (id === 'vaxt')   setView('vaxt');
        else if (id === 'xerite') setView('xerite');
        else if (id === 'diger')  setView('diger');
        else if (id === 'profil') setView('profil');
      }, []);

      // ── Vaxt screen handlers ────────────────────────────────
      const handleEndSession = useCallback(() => {
        if (!activeSession) return;
        // Re-open the slot we were occupying.
        setZoneSlots(prev => {
          const list = prev[activeSession.zoneId];
          if (!list) return prev;
          return {
            ...prev,
            [activeSession.zoneId]: list.map(s =>
              s.slotNumber === activeSession.slotNumber ? { ...s, status:'available' } : s),
          };
        });
        // Push to history.
        setParkingHistory(h => [{
          id: activeSession.id,
          zoneName: activeSession.zoneName,
          slotNumber: activeSession.slotNumber,
          date: new Date().toLocaleDateString('az-AZ', { day:'2-digit', month:'short', year:'numeric' }),
          duration: activeSession.durationLabel,
          totalAZN: activeSession.totalAZN,
        }, ...h].slice(0, 12));
        setActiveSession(null);
        showToast('Sessiya bitirildi');
      }, [activeSession, showToast]);

      // ── Profile / More handlers ────────────────────────────
      const handleTopUp = useCallback(() => {
        setBalance(b => +(b + 10).toFixed(2));
        showToast('+10 AZN balansa əlavə olundu');
      }, [showToast]);
      const handleAddCar = useCallback(() => {
        const next = window.prompt('Avtomobil nömrəsini daxil edin:', userCar || '');
        if (next && next.trim()) {
          setUserCar(next.trim().toUpperCase());
          showToast('Avtomobil yeniləndi');
        }
      }, [userCar, showToast]);
      const handleLogout = useCallback(() => {
        showToast('Demo rejimində çıxış deaktivdir');
      }, [showToast]);
      const handleMoreAction = useCallback((item) => {
        showToast(item.label + ' — demo rejimində');
      }, [showToast]);

      // The proximity modal's "PARK ET" CTA → close proximity, open payment.
      const handlePark = useCallback(() => {
        setProximityOpen(false);
        if (selectedSlot) setPaymentOpen(true);
      }, [selectedSlot]);

      return (
        <PhoneShell>
          {view === 'splash' && <SplashScreen onDone={() => setView('home')}/>}
          {view === 'home' && (
            <HomeScreen
              zones={MOCK_ZONES}
              searchQuery={searchQuery} setSearchQuery={setSearchQuery}
              accessibilityFilter={accessibilityFilter} setAccessibilityFilter={setAccessibilityFilter}
              tab={tab} setTab={setTab}
              aiRec={aiRec} aiLoading={aiLoading}
              onZoneSelect={handleZoneSelect} onAIGo={handleAIGo}/>
          )}
          {view === 'zone_detail' && selectedZone && (
            <ZoneDetailScreen
              zone={selectedZone} slots={slotsForZone} selectedSlot={selectedSlot}
              onBack={handleBack} onSelectSlot={handleSelectSlot}
              onRefresh={handleRefresh}
              onProximity={() => setProximityOpen(true)}
              onPark={handleOpenPayment}
              refreshing={refreshing}
              userLocation={userLocation}
              nearestSlot={nearestAvailableSlot}/>
          )}
          {view === 'vaxt' && (
            <HistoryScreen
              activeSession={activeSession}
              history={parkingHistory}
              onEndSession={handleEndSession}
              onPickZone={() => setView('home')}/>
          )}
          {view === 'xerite' && (
            <FullMapScreen
              zones={MOCK_ZONES}
              onSelectZone={handleZoneSelect}
              userLocation={userLocation}
              nearestSlot={nearestAvailableSlot}/>
          )}
          {view === 'diger' && (
            <MoreScreen onAction={handleMoreAction}/>
          )}
          {view === 'profil' && (
            <ProfileScreen
              user={USER} balance={balance} userCar={userCar}
              onTopUp={handleTopUp} onAddCar={handleAddCar} onLogout={handleLogout}/>
          )}
          {view !== 'splash' && (
            <BottomNav active={activeNav} onChange={handleNavChange}/>
          )}
          {proximityOpen && selectedZone && selectedSlot && (
            <ProximityModal
              zone={selectedZone} slots={slotsForZone} selectedSlot={selectedSlot}
              onClose={() => setProximityOpen(false)} onPark={handlePark}/>
          )}
          {paymentOpen && selectedZone && selectedSlot && (
            <PaymentModal
              zone={selectedZone} slot={selectedSlot}
              balance={balance}
              onClose={() => setPaymentOpen(false)}
              onConfirm={handleConfirmPayment}/>
          )}
          {showConfetti && <Confetti/>}
          {toast && (
            <div className="fixed left-1/2 -translate-x-1/2 bottom-24 z-[400] animate-fade-in pointer-events-none">
              <div className="bg-az-ink text-white text-[12px] font-display font-bold px-4 py-2.5 rounded-full shadow-lg shadow-black/20">
                {toast}
              </div>
            </div>
          )}
        </PhoneShell>
      );
    }

    // ── BOOTSTRAP ──────────────────────────────────────────────────
    try {
      const root = createRoot(document.getElementById('root'));
      root.render(<App/>);
      // hide pre-loader once React mounts
      const pl = document.getElementById('pre-loader');
      if (pl) pl.style.display = 'none';
    } catch (bootErr) {
      const ov = document.getElementById('err-overlay');
      const pl = document.getElementById('pre-loader');
      if (pl) pl.style.display = 'none';
      if (ov) {
        ov.style.display = 'block';
        ov.textContent =
          '── BOOTSTRAP CRASH ─────────────\n' +
          (bootErr && (bootErr.message || String(bootErr))) +
          (bootErr && bootErr.stack ? '\n\n' + bootErr.stack : '');
      }
      throw bootErr;
    }
  </script>
</body>
</html>
