# AzParking Smart — Render statik deploy
# https://render.com/docs/deploy-create-react-app#configure-render
services:
  - type: web
    name: azparking-smart
    runtime: static
    buildCommand: mkdir -p public && cp standalone.html public/index.html
    staticPublishPath: ./public
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
